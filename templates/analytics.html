<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - SmartGrid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.45.0/dist/apexcharts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI'; }
        .sidebar { background: linear-gradient(135deg, #1a202c, #2d3748); min-height: 100vh; position: fixed; left: 0; top: 0; width: 260px; padding-top: 20px; z-index: 1000; border-right: 1px solid #4a5568; }
        .sidebar-brand { padding: 20px; text-align: center; border-bottom: 1px solid #4a5568; margin-bottom: 20px; }
        .sidebar-brand h4 { color: #60a5fa; font-weight: 700; }
        .nav-link { color: #cbd5e0; padding: 12px 15px; margin: 8px 10px; border-radius: 8px; transition: all 0.3s; }
        .nav-link:hover { background: rgba(96, 165, 250, 0.1); color: #60a5fa; }
        .nav-link.active { background: rgba(96, 165, 250, 0.2); color: #60a5fa; border-left: 3px solid #60a5fa; }
        .main-content { margin-left: 260px; padding: 30px; }
        .top-navbar { background: linear-gradient(135deg, #1a202c, #2d3748); border-bottom: 1px solid #4a5568; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; margin: -30px -30px 30px -30px; margin-left: calc(-30px + 260px); }
        .top-navbar h2 { color: #60a5fa; font-weight: 700; }
        .chart-card { background: linear-gradient(135deg, #1f2937, #111827); border: 1px solid #374151; border-radius: 12px; padding: 25px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, #1f2937, #111827); border: 1px solid #374151; border-radius: 12px; padding: 25px; transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-5px); border-color: #60a5fa; box-shadow: 0 10px 30px rgba(96, 165, 250, 0.2); }
        .stat-value { font-size: 28px; font-weight: 700; color: #60a5fa; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand"><h4><i class="fas fa-bolt"></i> SmartGrid</h4></div>
    <nav>
        <a class="nav-link" href="/"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a class="nav-link active" href="/analytics"><i class="fas fa-bar-chart"></i> Analytics</a>
        <a class="nav-link" href="/models"><i class="fas fa-brain"></i> Models</a>
        <a class="nav-link" href="/alerts"><i class="fas fa-bell"></i> Alerts</a>
        <a class="nav-link" href="/settings"><i class="fas fa-cog"></i> Settings</a>
        <a class="nav-link" href="/admin"><i class="fas fa-lock"></i> Admin</a>
        <a class="nav-link" href="/export"><i class="fas fa-download"></i> Export</a>
        <hr style="border-color: #4a5568; margin: 20px 0;">
        <a class="nav-link" href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
</div>

<div class="main-content">
    <div class="top-navbar">
        <h2><i class="fas fa-bar-chart"></i> Analytics Dashboard</h2>
    </div>


    <!-- Statistics Cards -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="stat-card"><i class="fas fa-plug" style="font-size: 32px; color: #fbbf24; margin-bottom: 10px;"></i>
                <div style="color: #9ca3af; font-size: 12px;">Avg Voltage</div>
                <div class="stat-value" id="avgVolt">-- V</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card"><i class="fas fa-plug" style="font-size: 32px; color: #3b82f6; margin-bottom: 10px;"></i>
                <div style="color: #9ca3af; font-size: 12px;">Avg Current</div>
                <div class="stat-value" id="avgCurr">-- mA</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card"><i class="fas fa-wave-square" style="font-size: 32px; color: #8b5cf6; margin-bottom: 10px;"></i>
                <div style="color: #9ca3af; font-size: 12px;">Avg Frequency</div>
                <div class="stat-value" id="avgFreq">-- Hz</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card"><i class="fas fa-database" style="font-size: 32px; color: #22c55e; margin-bottom: 10px;"></i>
                <div style="color: #9ca3af; font-size: 12px;">Total Readings</div>
                <div class="stat-value" id="totalReads">0</div>
            </div>
        </div>
    </div>

    <!-- Live Readings -->
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="stat-card">
                <div style="color: #9ca3af; font-size: 14px;">Live Voltage</div>
                <div class="stat-value" id="liveVolt">-- V</div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="stat-card">
                <div style="color: #9ca3af; font-size: 14px;">Live Current</div>
                <div class="stat-value" id="liveCurr">-- mA</div>
            </div>
        </div>
    </div>

    <!-- Charts -->


    <div class="row mb-4">
        <div class="col-lg-12">
            <div class="chart-card">
                <h5 style="margin-bottom: 20px; color: #e2e8f0;"><i class="fas fa-chart-area"></i> Fault Occurrences</h5>
                <div id="faultChart"></div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-12">
            <div class="chart-card">
                <h5 style="margin-bottom: 20px; color: #e2e8f0;"><i class="fas fa-clock"></i> Hourly Statistics</h5>
                <div id="hourlyChart"></div>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-lg-4">
            <div class="chart-card">
                <h5 style="margin-bottom: 20px; color: #e2e8f0;"><i class="fas fa-bolt"></i> Voltage Graph</h5>
                <canvas id="voltageChart" width="100%" height="250"></canvas>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="chart-card">
                <h5 style="margin-bottom: 20px; color: #e2e8f0;"><i class="fas fa-bolt"></i> Current Graph</h5>
                <canvas id="currentChart" width="100%" height="250"></canvas>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="chart-card">
                <h5 style="margin-bottom: 20px; color: #e2e8f0;"><i class="fas fa-wave-square"></i> Frequency Graph</h5>
                <canvas id="frequencyChart" width="100%" height="250"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const chartOpts = {
        chart: { background: 'transparent', toolbar: { show: false }, animations: { enabled: true } },
        theme: { mode: 'dark' },
        grid: { borderColor: '#374151' }
    };



    const faultChart = new ApexCharts(document.getElementById('faultChart'), {
        ...chartOpts, chart: { ...chartOpts.chart, type: 'bar' },
        series: [{ name: 'Count', data: [] }], colors: ['#ef4444'], xaxis: { categories: [] }
    });
    faultChart.render();

    const hourlyChart = new ApexCharts(document.getElementById('hourlyChart'), {
        ...chartOpts, chart: { ...chartOpts.chart, type: 'area' },
        series: [{ name: 'Voltage', data: [] }, { name: 'Current', data: [] }], colors: ['#fbbf24', '#3b82f6']
    });
    hourlyChart.render();


    async function loadAnalytics() {
        try {
            const res = await fetch('/api/analytics');
            const data = await res.json();
            document.getElementById('avgVolt').textContent = data.stats.voltage.avg.toFixed(2) + ' V';
            document.getElementById('avgCurr').textContent = data.stats.current.avg.toFixed(2) + ' mA';
            document.getElementById('avgFreq').textContent = data.stats.frequency.avg.toFixed(2) + ' Hz';
            document.getElementById('totalReads').textContent = data.stats.total_readings;

            // Fetch live readings
            const liveRes = await fetch('/live-data');
            const live = await liveRes.json();
            document.getElementById('liveVolt').textContent = live.voltage !== undefined ? live.voltage.toFixed(2) + ' V' : '-- V';
            document.getElementById('liveCurr').textContent = live.current !== undefined ? live.current.toFixed(2) + ' mA' : '-- mA';

            faultChart.updateSeries([{ data: data.fault_counts }]);
            faultChart.updateOptions({ xaxis: { categories: data.fault_categories } });
            hourlyChart.updateSeries(data.hourly_data);
        } catch (e) { console.warn('Analytics error:', e); }
    }

    loadAnalytics();
    setInterval(loadAnalytics, 2000);

    async function fetchLiveHistory() {
        const res = await fetch('/api/hardware/history?limit=50');
        const data = await res.json();
        return data.data || [];
    }

    function updateChart(chart, labels, data, label, color) {
        chart.data.labels = labels;
        chart.data.datasets[0].data = data;
        chart.data.datasets[0].label = label;
        chart.data.datasets[0].borderColor = color;
        chart.update();
    }

    document.addEventListener('DOMContentLoaded', async function() {
        const voltageCtx = document.getElementById('voltageChart').getContext('2d');
        const currentCtx = document.getElementById('currentChart').getContext('2d');
        const frequencyCtx = document.getElementById('frequencyChart').getContext('2d');

        const voltageChart = new Chart(voltageCtx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Voltage (V)', data: [], borderColor: '#fbbf24', fill: false }] },
            options: { responsive: false, scales: { x: { display: true }, y: { display: true } } }
        });
        const currentChart = new Chart(currentCtx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Current (mA)', data: [], borderColor: '#3b82f6', fill: false }] },
            options: { responsive: false, scales: { x: { display: true }, y: { display: true } } }
        });
        const frequencyChart = new Chart(frequencyCtx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Frequency (Hz)', data: [], borderColor: '#8b5cf6', fill: false }] },
            options: { responsive: false, scales: { x: { display: true }, y: { display: true } } }
        });

        async function refreshCharts() {
            const history = await fetchLiveHistory();
            const labels = history.map(h => new Date(h.timestamp).toLocaleTimeString());
            updateChart(voltageChart, labels, history.map(h => h.voltage), 'Voltage (V)', '#fbbf24');
            updateChart(currentChart, labels, history.map(h => h.current), 'Current (mA)', '#3b82f6');
            updateChart(frequencyChart, labels, history.map(h => h.frequency), 'Frequency (Hz)', '#8b5cf6');
        }
        await refreshCharts();
        setInterval(refreshCharts, 2000);
    });
</script>

</body>
</html>
